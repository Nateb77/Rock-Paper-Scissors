<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>🎮 Rock, Paper, Scissors</h1>
    </header>

    <dialog id="myModal">
        <h2>How to Play</h2>
        <p>
            Choose rock, paper, or scissors. The computer picks randomly.
            <br><br>
            ✔ Rock beats Scissors  
            ✔ Scissors beats Paper  
            ✔ Paper beats Rock  
        </p>
        <button id="closeModal">Got it!</button>
    </dialog>

    <main class="game-container">

        <!-- Choices (UPDATED: images are buttons now) -->
        <div class="choices">
            <button class="choice" onclick="play('rock')">
                <img src="rock.webp" alt="Rock">
                <span>Rock</span>
            </button>

            <button class="choice" onclick="play('paper')">
                <img src="paper.png" alt="Paper">
                <span>Paper</span>
            </button>

            <button class="choice" onclick="play('scissors')">
                <img src="scissors.png" alt="Scissors">
                <span>Scissors</span>
            </button>
        </div>

        <!-- Result -->
        <div class="result-box">
            <h2 id="result">Make your move!</h2>
            <p id="round-info"></p>
            <button id="reset" onclick="resetGame()">Play Again</button>
        </div>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="player">
                <img src="sigma.jpg" alt="Player">
                <h3>You</h3>
                <p id="you-choice"></p>
            </div>

            <div class="score" id="score">
                Player: 0 | Computer: 0
            </div>

            <div class="computer">
                <img src="termnator.jpg" alt="Computer">
                <h3>Computer</h3>
                <p id="computer-choice"></p>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
